name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: 🔨 Package Application with PyInstaller
        run: pyinstaller --onefile --name echo_print_check --icon echo.ico main.py

      - name: ⬆️ Upload Executable as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/echo_print_check.exe

  create_release:
    name: Create GitHub Release
    needs: build_windows
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Download Windows EXE Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-EXE
          path: ./release_assets/

      - name: 🏷️ Create and Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./release_assets/echo_print_check.exe
          prerelease: false