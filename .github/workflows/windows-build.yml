name: Build Windows Executable

on:
  push:
    tags: # Trigger only when a new tag (e.g., v1.0.0) is pushed
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name echo_print_check main.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: main-exe
          path: dist/main.exe

  # 2. Job to create the GitHub Release
  create_release:
    name: Create GitHub Release
    needs: build # Ensures this only runs after the EXE is successfully built
    runs-on: ubuntu-latest # Can use a cheaper Linux runner for the upload/release

    steps:
      - name: ⬇️ Download Windows EXE Artifact
        uses: actions/download-artifact@v4
        with:
          name: main-exe
          path: ./release_assets/ # Downloads the .exe into this temporary folder

      - name: 🏷️ Create and Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # Only runs if triggered by a tag push
        with:
          files: ./release_assets/main.exe # Path to the downloaded EXE
          prerelease: false
          # The tag name is automatically used for the release