name: Build Windows Executable

on:
  push:
    branches:
      - main  # Triggers on every push to the main branch
  workflow_dispatch:

permissions:
  contents: write


jobs:
  build:
    runs-on: windows-latest
    outputs:
      tag_name: ${{ steps.set_tag.outputs.TAG }} # Pass the tag to the next job

    steps:
      - uses: actions/checkout@v3

      - name: Generate Tag Name
          id: set_tag
          shell: bash
          # This creates a unique tag using the date and short commit SHA
          run: |
            TAG_NAME="build-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
            echo "TAG=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name echo_print_check main.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: main-exe
          path: dist/echo_print_check.exe

  # 2. Job to create the GitHub Release
  create_release:
    name: Create GitHub Release
    needs: build # Ensures this only runs after the EXE is successfully built
    runs-on: ubuntu-latest # Can use a cheaper Linux runner for the upload/release

    steps:
      - name: ⬇️ Download Windows EXE Artifact
        uses: actions/download-artifact@v4
        with:
          name: main-exe
          path: ./release_assets/ # Downloads the .exe into this temporary folder

      - name: 🏷️ Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }} # Use the auto-generated tag
          files: ./release_assets/echo_print_check.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}